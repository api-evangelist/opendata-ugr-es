aid: opendata-ugr-es
name: Bienvenido a OpenData UGR
description: >-
  Bienvenido a OpenData UGR is a open data portal open-data portal for Spain running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 65 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
