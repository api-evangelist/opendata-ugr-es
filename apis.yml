    name: Bienvenido a OpenData UGR CKAN Action API
    description: >-
      CKAN Action API for Bienvenido a OpenData UGR, a consistent JSON-over-HTTP interface over a catalog of 65 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://opendata.ugr.es/api/3/action/.
